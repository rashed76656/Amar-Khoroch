<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">Amar Khoroch app preview</title>
  <desc id="desc">A stylized preview of the expense tracker home screen showing balance, wallets, and bottom navigation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbf7f0"/>
      <stop offset="100%" stop-color="#f3eee6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#d8c7ad" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 700 42px/1.2 Arial, Helvetica, sans-serif; fill: #222; }
      .label { font: 600 20px/1.2 Arial, Helvetica, sans-serif; fill: #8a8a8a; }
      .value { font: 700 64px/1.1 Arial, Helvetica, sans-serif; fill: #161616; }
      .nav { font: 600 18px/1.2 Arial, Helvetica, sans-serif; fill: #a9a9a9; }
      .navActive { font: 700 18px/1.2 Arial, Helvetica, sans-serif; fill: #d59a54; }
      .cardText { font: 700 26px/1.2 Arial, Helvetica, sans-serif; fill: #222; }
      .small { font: 600 16px/1.2 Arial, Helvetica, sans-serif; fill: #8d8d8d; }
      .mini { font: 700 20px/1.2 Arial, Helvetica, sans-serif; fill: #222; }
    </style>
  </defs>

  <rect width="1400" height="980" rx="0" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="60" y="56" width="1280" height="780" rx="42" fill="#f6f1e8"/>
  </g>

  <circle cx="160" cy="150" r="34" fill="#efe2cf"/>
  <circle cx="160" cy="145" r="13" fill="none" stroke="#d59a54" stroke-width="4"/>
  <path d="M144 176c6-12 26-12 32 0" fill="none" stroke="#d59a54" stroke-width="4" stroke-linecap="round"/>
  <text x="220" y="162" class="title">Rashed</text>
  <path d="M349 143l14 14 14-14" fill="none" stroke="#888" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="74" y="204" width="70" height="70" rx="18" fill="#fff"/>
  <path d="M116 228v28M102 242h28" stroke="#777" stroke-width="4" stroke-linecap="round"/>
  <text x="505" y="160" text-anchor="middle" class="title">April 2026</text>
  <rect x="1256" y="204" width="70" height="70" rx="18" fill="#fff" opacity="0.82"/>
  <path d="M1286 228l14 14 14-14" fill="none" stroke="#ddd" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="60" y="308" width="1280" height="360" rx="34" fill="#f1e6d5"/>
  </g>
  <text x="110" y="378" class="label">Total Balance</text>
  <circle cx="1240" cy="365" r="16" fill="none" stroke="#9a9a9a" stroke-width="4"/>
  <circle cx="1240" cy="365" r="6" fill="#9a9a9a"/>
  <text x="110" y="470" class="value">৳ 0</text>

  <g>
    <rect x="100" y="560" width="280" height="168" rx="28" fill="#fff"/>
    <circle cx="145" cy="610" r="17" fill="#3ac45a"/>
    <path d="M145 601v18M137 609l8-8 8 8" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="172" y="618" class="mini" fill="#3ac45a">Income</text>
    <text x="122" y="682" class="cardText">৳ 0</text>

    <rect x="410" y="560" width="280" height="168" rx="28" fill="#fff"/>
    <circle cx="455" cy="610" r="17" fill="#ff4b43"/>
    <path d="M455 619v-18M447 611l8 8 8-8" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="482" y="618" class="mini" fill="#ff4b43">Expense</text>
    <text x="432" y="682" class="cardText">৳ 0</text>

    <rect x="720" y="560" width="280" height="168" rx="28" fill="#fff"/>
    <path d="M770 612l18-18 18 18" fill="none" stroke="#2eb24f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="788" y1="594" x2="788" y2="632" stroke="#2eb24f" stroke-width="5" stroke-linecap="round"/>
    <text x="802" y="618" class="mini" fill="#2eb24f">Net</text>
    <text x="742" y="682" class="cardText">৳ 0</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="60" y="704" width="1280" height="88" rx="24" fill="#fff"/>
  </g>
  <rect x="92" y="727" width="44" height="44" rx="8" fill="#efe2cf"/>
  <path d="M102 739h24M102 750h24M102 761h24" stroke="#d59a54" stroke-width="4" stroke-linecap="round"/>
  <text x="160" y="758" class="cardText">Manage Wallets</text>
  <text x="1142" y="758" text-anchor="end" class="small">0 wallets</text>
  <path d="M1190 742l14 14-14 14" fill="none" stroke="#b7b7b7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <g>
    <circle cx="700" cy="700" r="92" fill="#f4e8d6"/>
    <path d="M678 650h28l18 18v56h-46z" fill="none" stroke="#d59a54" stroke-width="6" stroke-linejoin="round"/>
    <path d="M706 650v18h18" fill="none" stroke="#d59a54" stroke-width="6" stroke-linejoin="round"/>
  </g>

  <text x="700" y="865" text-anchor="middle" class="title">No transactions yet</text>
  <text x="700" y="905" text-anchor="middle" class="small">Tap the + button to add your first transaction</text>

  <g filter="url(#shadow)">
    <rect x="1130" y="712" width="108" height="108" rx="28" fill="#dba15f"/>
  </g>
  <path d="M1184 740v52M1158 766h52" stroke="#fff" stroke-width="7" stroke-linecap="round"/>

  <g>
    <rect x="80" y="840" width="226" height="112" rx="28" fill="#f7ecdc"/>
    <rect x="106" y="864" width="34" height="34" rx="8" fill="#e4c08f"/>
    <path d="M110 866h26M110 875h26M110 884h26" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    <text x="114" y="918" class="navActive">Transactions</text>

    <text x="450" y="918" class="nav">Budgets</text>
    <circle cx="466" cy="875" r="18" fill="#b9b9b9"/>
    <path d="M466 861v28M452 875h28" stroke="#fff" stroke-width="4" stroke-linecap="round"/>

    <text x="725" y="918" class="nav">Reports</text>
    <circle cx="742" cy="875" r="18" fill="#b9b9b9"/>
    <path d="M742 857a18 18 0 1 1-13 31" fill="none" stroke="#fff" stroke-width="4"/>

    <text x="978" y="918" class="nav">Settings</text>
    <circle cx="995" cy="875" r="18" fill="#b9b9b9"/>
    <path d="M995 866a9 9 0 1 0 0.1 0" fill="none" stroke="#fff" stroke-width="4"/>
  </g>
</svg>